---
- name: Install Prerequisites for mounts
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop:
    - nfs-utils
    - cifs-utils
  tags: mount
  become: true

- name: Extract mounts for current host
  ansible.builtin.set_fact:
    host_specific_mounts: "{{ host_mounts[inventory_hostname] | default({}) }}"
  when: host_mounts is defined

- name: Create mounts list from dictionary values
  ansible.builtin.set_fact:
    mounts_list: "{{ host_specific_mounts.values() | list }}"
  when: host_specific_mounts is defined

- name: Debug - Show mounts list
  ansible.builtin.debug:
    var: mounts_list
    verbosity: 1
  when: mounts_list is defined

- name: Clean existing fstab entries for these mounts
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^[^#].*{{ item.mount | regex_escape() }}\s'
    state: absent
  loop: "{{ mounts_list }}"
  when: mounts_list is defined
  tags: mount
  become: true

- name: Ensure mount point directories exist
  ansible.builtin.file:
    path: "{{ item.mount }}"
    state: directory
    mode: '0755'
  loop: "{{ mounts_list }}"
  when:
    - mounts_list is defined
    - item.mount_state | default('present') == 'present'
  tags: mount
  become: true

- name: Add mount entries to fstab with proper escaping
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: '{{ item.src | regex_replace(" ", "\\\\040") }} {{ item.mount }} {{ item.fstype | default("auto") }} {{ item.opts | default("defaults") }} 0 0'
    backup: true
    insertafter: EOF
  loop: "{{ mounts_list }}"
  when:
    - mounts_list is defined
    - item.mount_state | default('present') == 'present'
  notify: mount all filesystems
  tags: mount
  become: true

- name: Remove mount entries from fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^[^#].*{{ item.mount | regex_escape() }}\s'
    state: absent
  loop: "{{ mounts_list }}"
  when:
    - mounts_list is defined
    - item.mount_state | default('present') == 'absent'
  notify: unmount filesystems
  tags: mount
  become: true

- name: Ensure filesystems are mounted
  ansible.posix.mount:
    path: "{{ item.mount }}"
    src: "{{ item.src }}"
    fstype: "{{ item.fstype | default('auto') }}"
    opts: "{{ item.opts | default('defaults') }}"
    state: mounted
  loop: "{{ mounts_list }}"
  when:
    - mounts_list is defined
    - item.mount_state | default('present') == 'present'
  tags: mount
  become: true

- name: Ensure filesystems are unmounted
  ansible.posix.mount:
    path: "{{ item.mount }}"
    state: unmounted
  loop: "{{ mounts_list }}"
  when:
    - mounts_list is defined
    - item.mount_state | default('present') == 'absent'
  tags: mount
  become: true

- name: Remove mount directories for absent mounts
  ansible.builtin.file:
    path: "{{ item.mount }}"
    state: absent
  loop: "{{ mounts_list }}"
  when:
    - mounts_list is defined
    - item.mount_state | default('present') == 'absent'
  tags: mount
  become: true

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
  tags: mount