- name: Configure Docker Test repo.
  ansible.builtin.lineinfile:
    path: '/etc/yum.repos.d/docker-{{ docker_edition }}.repo'
    create: true
    line: '{{ item }}'
    mode: '0644'
  with_items:
    - '[docker-{{ docker_edition }}-test]'
    - 'enabled={{ docker_yum_repo_enable_test }}'
  when: docker_add_repo | bool
  become: true

- name: Configure containerd on RHEL 8.
  block:
    - name: Ensure runc is not installed.
      ansible.builtin.package:
        name: runc
        state: absent

    - name: Ensure container-selinux is installed.
      ansible.builtin.package:
        name: container-selinux
        state: present

    - name: Ensure containerd.io is installed.
      ansible.builtin.package:
        name: containerd.io
        state: present
  when: ansible_distribution_major_version | int == 8
  become: true

- name: Create group docker if not present
  ansible.builtin.group:
    name: docker
    state: present

- name: Create Docker folder in /opt
  ansible.builtin.file:
    path: /opt/Docker
    state: directory
    mode: '0775'
    owner: root
    group: docker
  become: true
