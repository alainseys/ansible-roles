---
- name: Install Postfix
  ansible.builtin.dnf:
    name: postfix
    state: present

- name: Enable Postfix
  ansible.builtin.service:
    name: postfix
    state: started
    enabled: true

- name: Install > unattended-updates
  ansible.builtin.dnf:
    name: "{{ rhel_service }}"
    state: present

- name: Enable unattended-updates
  ansible.builtin.service:
    name: "{{ rhel_service }}.timer"
    state: started
    enabled: true

- name: Copy automatic.conf to /etc/dnf
  ansible.builtin.copy:
    src: "automatic.conf"
    dest: /etc/dnf/automatic.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart dnf-automatic
