---
- name: "Debian: > Update cache once per 24 Hours"
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 86400
  become: true

- name: Install Postfix
  ansible.builtin.apt:
    name: postfix
    state: present
  become: true


- name: Enable Postfix
  ansible.builtin.service:
    name: postfix
    state: started
    enabled: true
  become: true

- name: Install > unattended-updates on Debian Systems
  ansible.builtin.package:
    name: "{{ debian_service }}"
    state: present
  become: true

- name: Copy 50unattended-upgrades to /etc/apt/apt.conf.d/
  ansible.builtin.copy:
    src: "50unattended-upgrades"
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart unattende-updates
  become: true

