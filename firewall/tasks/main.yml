---
- name: "Debian: include Debian.yml"
  ansible.builtin.include_tasks:
    file: "{{ ansible_os_family }}.yml"
  when: ansible_os_family in ['Debian', 'Ubuntu']

- name: "Redhat: include Redhat.yml"
  ansible.builtin.include_tasks:
    file: "{{ ansible_os_family }}.yml"
  when: ansible_os_family in ['RedHat','Fedora','Rockey']
